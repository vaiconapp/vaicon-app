# Build: Expo ενσωματώνει τις EXPO_PUBLIC_* κατά το `expo export` (όχι runtime).
# Υποχρεωτικό στο Netlify: Site settings → Environment variables →
#   EXPO_PUBLIC_FIREBASE_API_KEY = (ίδιο με το τοπικό .env)
# Μετά: Redeploy (χωρίς νέο key το bundle μένει με undefined).

[build]
  command = "npx expo export -p web"
  publish = "dist"
  functions = "netlify/functions"

# Τα δύο κλειδιά Firebase είναι δημόσια (client keys) — τα εξαιρούμε από τον σαρωτή μυστικών.
# Η προστασία παραμένει ενεργή για τα πραγματικά μυστικά (π.χ. FIREBASE_SERVICE_ACCOUNT).
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "EXPO_PUBLIC_FIREBASE_API_KEY,FIREBASE_API_KEY"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyC2p46fX-FD5sszWHnkJB2hEJBN1bTkHWI,AIzaSyDTAyLh1-Jrdpz_TRUFbpQhqZHNhfPg47U"

# Ειδοποιήσεις πελατών (Viber/SMS μέσω Yuboto) — ίδιο σύστημα με vaicon-eidikes.
# Υποχρεωτικά env vars στο Netlify για live αποστολή:
#   YUBOTO_API_KEY, YUBOTO_SENDER, YUBOTO_VIBER_SENDER, YUBOTO_TEST_MODE,
#   FIREBASE_DB_URL, FIREBASE_SERVICE_ACCOUNT
[functions]
  node_bundler = "esbuild"

[dev]
  command = "npx expo start --web --port 8084"
  targetPort = 8084
  port = 8888
  autoLaunch = false
