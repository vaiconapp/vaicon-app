# Build: Expo ενσωματώνει τις EXPO_PUBLIC_* κατά το `expo export` (όχι runtime).
# Υποχρεωτικό στο Netlify: Site settings → Environment variables →
#   EXPO_PUBLIC_FIREBASE_API_KEY = (ίδιο με το τοπικό .env)
# Μετά: Redeploy (χωρίς νέο key το bundle μένει με undefined).

[build]
  command = "npx expo export -p web"
  publish = "dist"
  functions = "netlify/functions"

# Ειδοποιήσεις πελατών (Viber/SMS μέσω Yuboto) — ίδιο σύστημα με vaicon-eidikes.
# Υποχρεωτικά env vars στο Netlify για live αποστολή:
#   YUBOTO_API_KEY, YUBOTO_SENDER, YUBOTO_VIBER_SENDER, YUBOTO_TEST_MODE,
#   FIREBASE_DB_URL, FIREBASE_SERVICE_ACCOUNT
[functions]
  node_bundler = "esbuild"
